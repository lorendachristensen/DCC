MEMORY {
    ZP:     start = $00,    size = $100,   type = rw, file = "";
    OAM:    start = $200,   size = $100,   type = rw, file = "";
    RAM:    start = $300,   size = $500,   type = rw, file = "";
    HEADER: start = $0,     size = $10,    type = ro, file = %O, fill = yes;
    PRG:    start = $C000,  size = $4000,  type = ro, file = %O, fill = yes, fillval = $FF;
    CHR:    start = $0,     size = $2000,  type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    OAM:      load = OAM,    type = bss;
    BSS:      load = RAM,    type = bss;
    HEADER:   load = HEADER, type = ro;
    CODE:     load = PRG,    type = ro,  start = $C000;
    RODATA:   load = PRG,    type = ro;
    VECTORS:  load = PRG,    type = ro,  start = $FFFA;
    CHARS:    load = CHR,    type = ro;
}
