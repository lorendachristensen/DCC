MEMORY {
    ZP:        start = $00,    size = $100,   type = rw, file = "";
    OAM:       start = $200,   size = $100,   type = rw, file = "";
    RAM:       start = $300,   size = $500,   type = rw, file = "";
    SRAM:      start = $6000,  size = $2000,  type = rw, file = "";
    HEADER:    start = $0,     size = $10,    type = ro, file = %O, fill = yes;

    # Switchable PRG bank at $8000-$BFFF (bank 0)
    PRG_BANK0: start = $8000,  size = $4000,  type = ro, file = %O, fill = yes, fillval = $FF;

    # Fixed PRG bank at $C000-$FFFF (bank 1 = last bank)
    PRG_FIXED: start = $C000,  size = $4000,  type = ro, file = %O, fill = yes, fillval = $FF;

    # Single CHR bank (8KB)
    CHR:       start = $0,     size = $2000,  type = ro, file = %O, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,         type = zp;
    OAM:       load = OAM,        type = bss;
    BSS:       load = RAM,        type = bss;
    SAVERAM:   load = SRAM,       type = bss;
    HEADER:    load = HEADER,     type = ro;

    # Switchable bank segment (empty for now)
    BANK0:     load = PRG_BANK0,  type = ro;

    # Fixed bank segments (all current code lives here)
    CODE:      load = PRG_FIXED,  type = ro, start = $C000;
    RODATA:    load = PRG_FIXED,  type = ro;
    VECTORS:   load = PRG_FIXED,  type = ro, start = $FFFA;

    # CHR
    CHARS:     load = CHR,        type = ro;
}
